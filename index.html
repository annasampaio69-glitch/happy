<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>missao.exe</title>

<style>
body {
  margin: 0;
  background: #0d1117;
  color: #fff;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

.hud {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 18px;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* coração */
.heart {
  position: absolute;
  font-size: 28px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.2s;
}

.heart:hover {
  transform: scale(1.3);
}

#final {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  text-align: center;
}
</style>
</head>

<body>

<div class="hud">
  ❤️ Energia: <span id="score">0</span>/10
</div>

<div id="game"></div>

<div id="final">
  <h1>Missão concluída</h1>
  <p>Nem o Naruto treinando anos conseguiria juntar tanta dedicação quanto você tem.</p>
  <p>E no meio de tudo isso…</p>
  <h2>eu te amo ❤️</h2>
</div>

<script>
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const final = document.getElementById("final");

let score = 0;

// cria coração
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";

  let x = Math.random() * (window.innerWidth - 30);
  let y = -30;

  heart.style.left = x + "px";
  heart.style.top = y + "px";

  game.appendChild(heart);

  // movimento manual (mais confiável que animation)
  let speed = Math.random() * 2 + 2;

  function fall() {
    y += speed;
    heart.style.top = y + "px";

    if (y < window.innerHeight) {
      requestAnimationFrame(fall);
    } else {
      heart.remove();
    }
  }

  fall();

  // clique
  heart.onclick = () => {
    heart.remove();
    score++;
    scoreEl.textContent = score;

    if (score >= 10) {
      endGame();
    }
  };
}

function endGame() {
  final.style.display = "block";
}

// cria vários corações
setInterval(createHeart, 700);
</script>

</body>
</html>
