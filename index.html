<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>missao.exe</title>

  
<style>
body {
  margin: 0;
  background: #0d1117;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#scoreBox {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 20px;
  z-index: 1000;
}

.heart {
  position: absolute;
  font-size: 30px;
  cursor: pointer;
  z-index: 999;
}
</style>
</head>

<body>

<div id="scoreBox">❤️ Energia: <span id="score">0</span>/10</div>

<script>
let score = 0;

// cria coração
function createHeart() {
  const heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.className = "heart";

  heart.style.left = Math.random() * (window.innerWidth - 30) + "px";
  heart.style.top = "0px";

  document.body.appendChild(heart);

  let pos = 0;

  const fall = setInterval(() => {
    pos += 4;
    heart.style.top = pos + "px";

    if (pos > window.innerHeight) {
      clearInterval(fall);
      heart.remove();
    }
  }, 20);

  // clique FUNCIONANDO
  heart.addEventListener("click", function () {
    heart.remove();
    score++;
    document.getElementById("score").innerText = score;

    if (score >= 10) {
      showMessage();
    }
  });
}

// mensagem final
function showMessage() {
  const msg = document.createElement("div");
  msg.innerHTML = `
    <div style="
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    ">
      <h1>Missão concluída</h1>
      <p>Nem o Naruto treinando anos conseguiria alcançar o nível que você tem.</p>
      <h2>eu te amo ❤️</h2>
    </div>
  `;
  document.body.appendChild(msg);
}

// gera corações
setInterval(createHeart, 800);
</script>

</body>
</html>
