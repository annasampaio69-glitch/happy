<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>missao.exe</title>

<style>
body {
  margin: 0;
  background: #0d1117;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

#scoreBox {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 20px;
}

.heart {
  position: absolute;
  font-size: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="scoreBox">❤️ Energia: <span id="score">0</span>/10</div>

<script>
let score = 0;

function createHeart() {
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.className = "heart";

  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.top = "0px";

  document.body.appendChild(heart);

  let pos = 0;

  let fall = setInterval(() => {
    pos += 3;
    heart.style.top = pos + "px";

    if (pos > window.innerHeight) {
      clearInterval(fall);
      heart.remove();
    }
  }, 20);

  heart.onclick = function () {
    heart.remove();
    score++;
    document.getElementById("score").innerText = score;

    if (score >= 10) {
      alert("eu te amo ❤️");
    }
  };
}

setInterval(createHeart, 800);
</script>

</body>
</html>
